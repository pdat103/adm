<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN PANEL - KTPM A2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-green: #39ff14;
            --bg-dark: #06090f;
        }
        body {
            background-color: var(--bg-dark);
            color: #e0e6ed;
            font-family: 'Share Tech Mono', monospace;
        }
        .heading-font { font-family: 'Orbitron', sans-serif; }
        .admin-card {
            background: rgba(13, 17, 23, 0.9);
            border: 1px solid #1f2937;
            transition: all 0.3s;
        }
        .admin-card.new-order {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { border-color: var(--neon-blue); }
            50% { border-color: transparent; }
            100% { border-color: var(--neon-blue); }
        }
        .status-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 99px;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-5xl mx-auto flex justify-between items-end mb-8 border-b border-gray-800 pb-4">
        <div>
            <h1 class="heading-font text-2xl font-bold text-[#00f3ff]">COMMAND_CENTER.SYS</h1>
            <p class="text-[10px] text-gray-500 uppercase">Hệ thống quản lý đơn hàng thời gian thực</p>
        </div>
        <div class="text-right">
            <p id="clock" class="text-sm font-bold">00:00:00</p>
            <p class="text-[10px] text-green-500 uppercase tracking-widest">Server Active</p>
        </div>
    </header>

    <main class="max-w-5xl mx-auto">
        <div id="error-display" class="hidden mb-4 p-3 bg-red-900/50 border border-red-500 text-red-200 text-xs rounded"></div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="admin-card p-4 rounded text-center">
                <p class="text-[10px] text-gray-500">TỔNG ĐƠN</p>
                <p id="stat-count" class="text-2xl font-bold text-white">0</p>
            </div>
            <div class="admin-card p-4 rounded text-center">
                <p class="text-[10px] text-gray-500">DOANH THU</p>
                <p id="stat-revenue" class="text-2xl font-bold text-[#ffaa00]">0K</p>
            </div>
            <div class="admin-card p-4 rounded text-center col-span-2">
                <p class="text-[10px] text-gray-500">TRẠNG THÁI HỆ THỐNG</p>
                <p id="system-status" class="text-sm text-green-400 mt-2">ĐANG KHỞI TẠO...</p>
            </div>
        </div>

        <h2 class="heading-font text-sm mb-4 flex items-center gap-2">
            <span class="w-2 h-2 bg-red-500 rounded-full animate-ping"></span>
            LIVE_ORDER_FEED
        </h2>
        
        <div id="order-feed" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div class="col-span-full text-center py-20 text-gray-600 italic">
                Đang kết nối cơ sở dữ liệu...
            </div>
        </div>
    </main>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, query, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMH9tkgsG1tAvS_nf0Pm5khuUnRfiYXyI",
            authDomain: "order-20214.firebaseapp.com",
            projectId: "order-20214",
            storageBucket: "order-20214.firebasestorage.app",
            messagingSenderId: "387631336975",
            appId: "1:387631336975:web:2bd285ba9a71327ae8dd7a",
            measurementId: "G-YZR9Y3NVZ4"
        };

        const appId = 'ktpm-a2-order-system';
        let lastOrderCount = -1;

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);

            const showError = (msg) => {
                const errDiv = document.getElementById('error-display');
                errDiv.innerText = msg;
                errDiv.classList.remove('hidden');
            };

            const startListening = () => {
                document.getElementById('system-status').innerText = "ĐANG LẮNG NGHE ĐƠN HÀNG...";
                const ordersRef = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
                onSnapshot(ordersRef, (snapshot) => {
                    const orders = [];
                    snapshot.forEach(doc => orders.push({ id: doc.id, ...doc.data() }));
                    orders.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                    renderOrders(orders);
                    updateStats(orders);
                    if (lastOrderCount !== -1 && orders.length > lastOrderCount) {
                        document.getElementById('notif-sound').play().catch(e => {});
                    }
                    lastOrderCount = orders.length;
                }, (error) => {
                    console.error("Firestore Error:", error);
                    showError("Lỗi tải dữ liệu: " + error.message + ". Kiểm tra lại Firestore Rules.");
                });
            };

            // Cố gắng đăng nhập nặc danh
            signInAnonymously(auth).catch(error => {
                console.error("Auth Error:", error);
                if (error.code === 'auth/configuration-not-found') {
                    showError("Lỗi: Bạn chưa bật 'Anonymous provider' trong Firebase Console > Authentication > Sign-in method.");
                } else {
                    showError("Lỗi đăng nhập: " + error.message);
                }
                // Vẫn thử lắng nghe vì đôi khi Firestore Rules cho phép đọc công khai
                startListening();
            });

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    startListening();
                }
            });

            // Gán các hàm vào window để dùng trong HTML onclick
            window.markDone = async (id) => {
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'orders', id);
                    await updateDoc(docRef, { status: 'đã xong' });
                } catch (e) { alert("Lỗi cập nhật: " + e.message); }
            };

            window.deleteOrder = async (id) => {
                if(confirm("Bạn có chắc muốn xoá đơn này?")) {
                    try {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'orders', id);
                        await deleteDoc(docRef);
                    } catch (e) { alert("Lỗi xoá: " + e.message); }
                }
            };

        } catch (e) {
            console.error("Initialization Error:", e);
            document.getElementById('system-status').innerText = "LỖI KHỞI TẠO";
            document.getElementById('system-status').classList.replace('text-green-400', 'text-red-500');
        }

        function renderOrders(orders) {
            const container = document.getElementById('order-feed');
            if (orders.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-20 text-gray-600 italic">Chưa có đơn hàng nào.</div>`;
                return;
            }
            container.innerHTML = '';
            orders.forEach(order => {
                const time = order.timestamp ? new Date(order.timestamp.seconds * 1000).toLocaleTimeString() : '...';
                const isDone = order.status === 'đã xong';
                const card = document.createElement('div');
                card.className = `admin-card p-4 rounded flex flex-col justify-between ${!isDone ? 'new-order' : 'opacity-60'}`;
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] text-gray-500">${time}</span>
                            <span class="status-badge ${isDone ? 'bg-gray-700 text-gray-300' : 'bg-[#00f3ff] text-black font-bold'}">
                                ${order.status}
                            </span>
                        </div>
                        <h3 class="heading-font text-white text-sm mb-1">${order.customer || 'Khách không tên'}</h3>
                        <p class="text-[10px] text-gray-400 mb-3 italic">"${order.note || 'Không có ghi chú'}"</p>
                        <div class="space-y-1 border-t border-gray-800 pt-2 mb-4">
                            ${(order.items || []).map(i => `
                                <div class="flex justify-between text-xs">
                                    <span>${i.name} x${i.qty}</span>
                                    <span>${i.price * i.qty}K</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="flex justify-between items-center mt-auto">
                        <span class="text-lg font-bold text-[#ffaa00]">${order.total}K</span>
                        <div class="flex gap-2">
                            <button onclick="deleteOrder('${order.id}')" class="p-1 px-2 border border-red-900 text-red-500 text-[10px] hover:bg-red-900 hover:text-white transition">XOÁ</button>
                            ${!isDone ? `<button onclick="markDone('${order.id}')" class="p-1 px-3 bg-[#39ff14] text-black text-[10px] font-bold">XONG</button>` : ''}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function updateStats(orders) {
            document.getElementById('stat-count').innerText = orders.length;
            const revenue = orders.reduce((sum, o) => sum + (o.total || 0), 0);
            document.getElementById('stat-revenue').innerText = revenue + 'K';
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
